# ML pipeline DAGs for the examples/ml_pipelines project.
#
# Each pipeline is a flat list of nodes. A node runs a `script` (optionally in a
# `mode`) and declares the artifacts it `produces` / `consumes`. Edges are derived
# by matching a node's `consumes` to whichever node `produces` the same artifact,
# so execution order falls out of the data flow — there are no hand-maintained
# stages, and the same script may appear more than once under different modes.
#
# Artifact refs are "type:name":
#   fs:    FeatureSet
#   ds:    DataSource
#   model: Model

pipelines:

  # Single-node pipeline: one script runs data -> features -> model -> endpoint.
  wine_classifier:
    - script: wine_classifier.py

  # aqsol: one script builds the FeatureSet; the two model scripts consume it and,
  # having no dependency on each other, run in parallel once it completes.
  aqsol:
    - script: aqsol_feature_set.py
      produces: [fs:aqsol_features]
    - script: aqsol_class.py
      consumes: [fs:aqsol_features]
    - script: aqsol_reg.py
      consumes: [fs:aqsol_features]
