name: AWS Tests (scp_sandbox)

# Runs the real-AWS test suite (`tox -m quick`) against the scp_sandbox
# account. Auth is GitHub OIDC -> github-actions-workbench role, which can
# only sts:AssumeRole into Workbench-BuilderRole — the REPL's default role.
# Running as Builder keeps the quick tier honest: the Builder deny blocks
# DataSource/FeatureSet destruction, so a delete-heavy test that belongs in a
# higher tier fails here instead of silently passing. No AWS keys in GitHub.
#
# Nightly + manual only (not per-PR): the tests create/delete real resources,
# so cost and shared-state collisions argue against running them on every push.

on:
  schedule:
    - cron: '0 6 * * *'  # nightly, 06:00 UTC (~11pm MST)
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write  # failure notification step files/updates an issue

# One run at a time — the tests share AWS resources (endpoints, Parameter
# Store keys) and two concurrent runs would collide.
concurrency:
  group: aws-tests-scp-sandbox
  cancel-in-progress: false

jobs:
  quick:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_SANDBOX }}:role/github-actions-workbench
          aws-region: us-west-2

      # Chain into the builder role so the job's ambient credentials match the
      # REPL's default role. The lean workbench.endpoints surface uses raw boto3
      # clients by design, so the ambient identity needs the builder role's
      # permissions (Builder is Execution minus DataSource/FeatureSet destruction,
      # which the endpoints surface never does).
      # Note: chained sessions are capped at 1 hour — fine for the quick suite.
      - name: Assume Workbench-BuilderRole
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_SANDBOX }}:role/Workbench-BuilderRole
          aws-region: us-west-2
          role-chaining: true
          # The builder role's trust policy allows sts:AssumeRole only —
          # session tagging would need sts:TagSession on both sides.
          role-skip-session-tagging: true

      - name: Install tox
        run: pip install tox

      # Reuse the tox env across runs (~2.5 min of pip install on a miss).
      # Keyed on the dep inputs; tox itself recreates the env if tox.ini's
      # deps change, so a stale hit is at worst a recreate, never a wrong env.
      - name: Cache tox environment
        uses: actions/cache@v6
        with:
          path: .tox/py313
          key: tox-py313-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'tox.ini') }}

      - name: Run quick tests
        env:
          WORKBENCH_CONFIG: ${{ github.workspace }}/ci/workbench_ci_config.json
          WORKBENCH_BUCKET: ${{ secrets.WORKBENCH_BUCKET_SANDBOX }}
          WORKBENCH_API_KEY: ${{ secrets.WORKBENCH_API_KEY_SANDBOX }}
        # -n 8 overrides tox's -n auto (last flag wins): the runner has 4 vCPUs
        # but these tests are network-bound (endpoints/Athena/S3), so
        # oversubscribing keeps workers busy while others wait on AWS.
        run: tox -m quick -- -n 8 tests

      # Scheduled-run failures notify nobody by default — surface them as an
      # issue: one open issue collects repeat failures until it's closed.
      - name: File issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="AWS tests failing on main"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open \
            --search "\"$title\" in:title" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" \
              --body "Still failing: $run_url (commit ${{ github.sha }})"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" \
              --body "The AWS test workflow failed: $run_url (commit ${{ github.sha }}). Subsequent failures will be added as comments here; close this issue once the suite is green."
          fi
