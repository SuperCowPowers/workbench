name: AWS Tests (scp_sandbox)

# Runs the real-AWS test suite (`tox -m quick`) against the scp_sandbox
# account. Auth is GitHub OIDC -> github-actions-workbench role, which can
# only sts:AssumeRole into Workbench-ExecutionRole — the same role workbench
# assumes everywhere else; no AWS keys are stored in GitHub.
#
# Nightly + manual only (not per-PR): the tests create/delete real resources,
# so cost and shared-state collisions argue against running them on every push.

on:
  schedule:
    - cron: '0 6 * * *'  # nightly, 06:00 UTC (~11pm MST)
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# One run at a time — the tests share AWS resources (endpoints, Parameter
# Store keys) and two concurrent runs would collide.
concurrency:
  group: aws-tests-scp-sandbox
  cancel-in-progress: false

jobs:
  quick:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_SANDBOX }}:role/github-actions-workbench
          aws-region: us-west-2

      # Chain into the execution role so the job's ambient credentials match
      # what workbench code expects everywhere else (ECS, endpoint containers).
      # The lean workbench.endpoints surface uses raw boto3 clients by design,
      # so the ambient identity needs the execution role's permissions.
      # Note: chained sessions are capped at 1 hour — fine for the quick suite.
      - name: Assume Workbench-ExecutionRole
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_SANDBOX }}:role/Workbench-ExecutionRole
          aws-region: us-west-2
          role-chaining: true
          # The execution role's trust policy allows sts:AssumeRole only —
          # session tagging would need sts:TagSession on both sides.
          role-skip-session-tagging: true

      - name: Install tox
        run: pip install tox

      # Reuse the tox env across runs (~2.5 min of pip install on a miss).
      # Keyed on the dep inputs; tox itself recreates the env if tox.ini's
      # deps change, so a stale hit is at worst a recreate, never a wrong env.
      - name: Cache tox environment
        uses: actions/cache@v4
        with:
          path: .tox/py313
          key: tox-py313-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'tox.ini') }}

      - name: Run quick tests
        env:
          WORKBENCH_CONFIG: ${{ github.workspace }}/ci/workbench_ci_config.json
          WORKBENCH_BUCKET: ${{ secrets.WORKBENCH_BUCKET_SANDBOX }}
          WORKBENCH_API_KEY: ${{ secrets.WORKBENCH_API_KEY_SANDBOX }}
        run: tox -m quick
