name: Secret Scan

on: [push, pull_request]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0  # full history so the scan covers all commits in the push/PR

    - name: Install gitleaks
      run: |
        curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
          | tar -xz -C /usr/local/bin gitleaks

    - name: Run gitleaks
      run: gitleaks git --no-banner -c .gitleaks.toml .
