name: Endpoint Import Surface Smoke Test

# Enforces the lightweight-install contract: `pip install workbench` (no extras)
# must be able to import every module a SageMaker endpoint container needs,
# without transitively pulling in any heavy dep that only lives in extras.
#
# If this job fails, an endpoint container would also fail on first cold-start
# after the change deploys.

on: [push, pull_request]

permissions:
  contents: read

jobs:
  endpoint-import-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install workbench (core only, no extras)
        run: |
          pip install -e .

      # Single source of truth: scripts/endpoint_import_smoke.py dynamically
      # enumerates every module under workbench/endpoints/ and checks the
      # heavy-deps blocklist. Adding a new module there auto-extends coverage —
      # no YAML edit needed.
      - name: Run endpoint-import-smoke contract check
        run: |
          python scripts/endpoint_import_smoke.py
