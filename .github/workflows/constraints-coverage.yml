name: Constraints Coverage Check

# Verifies every package referenced by pyproject.toml (deps + extras) and by
# every image-side requirements.txt (sagemaker_images/**/requirements.txt,
# applications/**/requirements.txt) is pinned to an exact
# `==` version in the repo-root constraints.txt. Prevents version drift
# between what pip-installers see and what containers actually ship.

on: [push, pull_request]

permissions:
  contents: read

jobs:
  constraints-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run constraints-coverage check
        run: |
          python ci/check_constraints.py
