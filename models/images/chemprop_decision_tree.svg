<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 230" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399" />
      <stop offset="100%" style="stop-color:#10b981" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff" />
      <stop offset="100%" style="stop-color:#3a86ff" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24" />
      <stop offset="100%" style="stop-color:#f59e0b" />
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#475569" />
      <stop offset="100%" style="stop-color:#94a3b8" />
    </linearGradient>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ══════════ BASE ══════════ -->
  <rect x="20" y="20" width="160" height="160" rx="12" fill="#1e293b" filter="url(#shadow)" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="52" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">BASE</text>

  <rect x="40" y="66" width="120" height="36" rx="8" fill="url(#greenGrad)"/>
  <text x="100" y="90" text-anchor="middle" fill="white" font-weight="700" font-size="14">Single-Task</text>

  <rect x="40" y="116" width="120" height="36" rx="8" fill="url(#blueGrad)"/>
  <text x="100" y="140" text-anchor="middle" fill="white" font-weight="700" font-size="14">Multi-Task</text>

  <!-- ══════════ Arrow 1 ══════════ -->
  <text x="225" y="82" text-anchor="middle" fill="#94a3b8" font-size="22" font-weight="700">+</text>
  <line x1="195" y1="100" x2="255" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- ══════════ ENHANCEMENTS ══════════ -->
  <rect x="270" y="20" width="190" height="160" rx="12" fill="#1e293b" filter="url(#shadow)" stroke="#334155" stroke-width="1.5"/>
  <text x="365" y="52" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">ENHANCEMENTS</text>

  <rect x="295" y="66" width="140" height="36" rx="8" fill="url(#purpleGrad)"/>
  <text x="365" y="90" text-anchor="middle" fill="white" font-weight="700" font-size="14">Hybrid</text>

  <rect x="295" y="116" width="140" height="36" rx="8" fill="url(#orangeGrad)"/>
  <text x="365" y="140" text-anchor="middle" fill="white" font-weight="700" font-size="14">Foundation</text>

  <!-- ══════════ Arrow 2 ══════════ -->
  <text x="505" y="82" text-anchor="middle" fill="#94a3b8" font-size="22" font-weight="700">=</text>
  <line x1="475" y1="100" x2="535" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- ══════════ FLEXIBLE COMBINATIONS ══════════ -->
  <rect x="550" y="10" width="310" height="210" rx="12" fill="#1e293b" filter="url(#shadow)" stroke="#334155" stroke-width="1.5"/>
  <text x="705" y="38" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">FLEXIBLE COMBINATIONS</text>

  <!-- Row 1: ST, MT -->
  <rect x="570" y="52" width="55" height="24" rx="6" fill="url(#greenGrad)"/>
  <text x="597" y="69" text-anchor="middle" fill="white" font-weight="600" font-size="11">ST</text>

  <rect x="640" y="52" width="55" height="24" rx="6" fill="url(#blueGrad)"/>
  <text x="667" y="69" text-anchor="middle" fill="white" font-weight="600" font-size="11">MT</text>

  <!-- Row 2: ST + Hybrid, MT + Hybrid -->
  <rect x="570" y="84" width="55" height="24" rx="6" fill="url(#greenGrad)"/>
  <text x="597" y="101" text-anchor="middle" fill="white" font-weight="600" font-size="11">ST</text>
  <text x="632" y="101" text-anchor="middle" fill="#64748b" font-size="11">+</text>
  <rect x="640" y="84" width="75" height="24" rx="6" fill="url(#purpleGrad)"/>
  <text x="677" y="101" text-anchor="middle" fill="white" font-weight="600" font-size="11">Hybrid</text>

  <!-- Row 3: ST + Foundation, MT + Foundation -->
  <rect x="570" y="116" width="55" height="24" rx="6" fill="url(#greenGrad)"/>
  <text x="597" y="133" text-anchor="middle" fill="white" font-weight="600" font-size="11">ST</text>
  <text x="632" y="133" text-anchor="middle" fill="#64748b" font-size="11">+</text>
  <rect x="640" y="116" width="105" height="24" rx="6" fill="url(#orangeGrad)"/>
  <text x="692" y="133" text-anchor="middle" fill="white" font-weight="600" font-size="11">Foundation</text>

  <!-- Row 4: MT + Hybrid + Foundation -->
  <rect x="570" y="148" width="55" height="24" rx="6" fill="url(#blueGrad)"/>
  <text x="597" y="165" text-anchor="middle" fill="white" font-weight="600" font-size="11">MT</text>
  <text x="632" y="165" text-anchor="middle" fill="#64748b" font-size="11">+</text>
  <rect x="640" y="148" width="75" height="24" rx="6" fill="url(#purpleGrad)"/>
  <text x="677" y="165" text-anchor="middle" fill="white" font-weight="600" font-size="11">Hybrid</text>
  <text x="722" y="165" text-anchor="middle" fill="#64748b" font-size="11">+</text>
  <rect x="730" y="148" width="105" height="24" rx="6" fill="url(#orangeGrad)"/>
  <text x="782" y="165" text-anchor="middle" fill="white" font-weight="600" font-size="11">Foundation</text>

  <!-- Row 5: ST + Hybrid + Foundation -->
  <rect x="570" y="180" width="55" height="24" rx="6" fill="url(#greenGrad)"/>
  <text x="597" y="197" text-anchor="middle" fill="white" font-weight="600" font-size="11">ST</text>
  <text x="632" y="197" text-anchor="middle" fill="#64748b" font-size="11">+</text>
  <rect x="640" y="180" width="75" height="24" rx="6" fill="url(#purpleGrad)"/>
  <text x="677" y="197" text-anchor="middle" fill="white" font-weight="600" font-size="11">Hybrid</text>
  <text x="722" y="197" text-anchor="middle" fill="#64748b" font-size="11">+</text>
  <rect x="730" y="180" width="105" height="24" rx="6" fill="url(#orangeGrad)"/>
  <text x="782" y="197" text-anchor="middle" fill="white" font-weight="600" font-size="11">Foundation</text>
</svg>
