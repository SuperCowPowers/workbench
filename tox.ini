[tox]
requires = tox>=4.24.0
env_list = lint, py310, py311, py312, py313, long, endpoint-import-smoke
labels =
    quick = py313
    lint = lint
    long = long
    smoke = endpoint-import-smoke
    parallel = parallel
    full = lint, py310, py311, py312, py313, long, endpoint-import-smoke

[testenv]
description = Run unit tests
basepython = python3.12
passenv = WORKBENCH_CONFIG
setenv =
    PLOTLY_RENDERER = {env:PLOTLY_RENDERER:browser}
deps =
    pytest
    pytest-sugar
    pytest-xdist
    coverage
    pytest-cov
    .[all]
commands = pytest --assert=plain -x -m "not long and not corner_case" {posargs:tests}

[testenv:verbose]
description = Run tests with verbose logging
deps = {[testenv]deps}
commands = pytest --assert=plain -x -m "not long and not corner_case" -s {posargs:tests}

[testenv:py310]
description = Run tests with Python 3.10
basepython = python3.10
deps = {[testenv]deps}

[testenv:py311]
description = Run tests with Python 3.11
basepython = python3.11
deps = {[testenv]deps}

[testenv:py312]
description = Run tests with Python 3.12
basepython = python3.12
deps = {[testenv]deps}

[testenv:py313]
description = Run tests with Python 3.13
basepython = python3.13
deps = {[testenv]deps}

[testenv:long]
description = Run long-duration tests
setenv = WORKBENCH_DEBUG = True
commands = pytest --assert=plain -x -v -s -m "long" {posargs:tests}

[testenv:parallel]
description = Run tests in parallel via pytest-xdist, file-level distribution.
# -n auto picks worker count from CPU cores (clamped sanely by xdist).
# --dist=loadfile keeps all tests in one file on the same worker so intra-file
#   ordering / shared fixtures are preserved. Cross-file parallelism is where
#   the speedup comes from — and where the risk lives. If you hit cross-file
#   AWS-resource collisions (same endpoint name, same Parameter Store key, etc.),
#   either lower -n, fix the test to use a unique resource, or drop the offender
#   into a serial group. Drop -x because failures in one worker don't reach
#   others — letting all workers finish gives a fuller picture.
basepython = python3.13
deps = {[testenv]deps}
commands = pytest --assert=plain -n auto --dist=loadfile -m "not long and not corner_case" {posargs:tests}

[testenv:lint]
description = Run linters
skip_install = true
deps =
    black>=22.12
    flake8
commands =
    black --line-length=120 {posargs:.}
    flake8 --exclude='*generated*,.tox/*'

[testenv:format]
description = Run formatters
skip_install = true
deps = black>=22.12
commands = black --line-length=120 {posargs:.}

[testenv:endpoint-import-smoke]
description = Verify the workbench.endpoints contract: every module imports without heavy extras.
# Contract: `workbench.endpoints.*` is THE import surface for model scripts
# running inside SageMaker endpoint containers. Every module under
# workbench/endpoints/ must be importable in the lightweight install (no
# [aws] / [modeling] / [ui] extras). If a refactor moves a heavy transitive
# import (sagemaker, aiobotocore, dash, cleanlab, umap-learn, matplotlib,
# mordred, ipython) into the import chain of any workbench.endpoints
# submodule, this job fails — telling us before an endpoint deploy does.
#
# This test enumerates the directory dynamically — adding a new module under
# workbench/endpoints/ automatically extends the contract. To exempt a module
# from the contract, it must not live under workbench/endpoints/.
basepython = python3.12
skip_install = false
deps =
    # Intentionally no extras — base install only.
commands = python {toxinidir}/scripts/endpoint_import_smoke.py
