[tox]
requires = tox>=4.24.0
env_list = lint, py310, py311, py312, py313, long, endpoint-import-smoke
labels =
    quick = py313
    lint = lint
    long = long
    smoke = endpoint-import-smoke
    full = lint, py310, py311, py312, py313, long, endpoint-import-smoke

[testenv]
description = Run unit tests
basepython = python3.12
passenv = WORKBENCH_CONFIG
setenv =
    PLOTLY_RENDERER = {env:PLOTLY_RENDERER:browser}
deps =
    pytest
    pytest-sugar
    coverage
    pytest-cov
    .[all]
commands = pytest --assert=plain -x -m "not long and not corner_case" {posargs:tests}

[testenv:verbose]
description = Run tests with verbose logging
deps = {[testenv]deps}
commands = pytest --assert=plain -x -m "not long and not corner_case" -s {posargs:tests}

[testenv:py310]
description = Run tests with Python 3.10
basepython = python3.10
deps = {[testenv]deps}

[testenv:py311]
description = Run tests with Python 3.11
basepython = python3.11
deps = {[testenv]deps}

[testenv:py312]
description = Run tests with Python 3.12
basepython = python3.12
deps = {[testenv]deps}

[testenv:py313]
description = Run tests with Python 3.13
basepython = python3.13
deps = {[testenv]deps}

[testenv:long]
description = Run long-duration tests
setenv = WORKBENCH_DEBUG = True
commands = pytest --assert=plain -x -v -s -m "long" {posargs:tests}

[testenv:lint]
description = Run linters
skip_install = true
deps =
    black>=22.12
    flake8
commands =
    black --line-length=120 {posargs:.}
    flake8 --exclude='*generated*,.tox/*'

[testenv:format]
description = Run formatters
skip_install = true
deps = black>=22.12
commands = black --line-length=120 {posargs:.}

[testenv:endpoint-import-smoke]
description = Verify the endpoint runtime can import its surface without heavy extras.
# Anything that runs inside a SageMaker endpoint container imports from this
# narrow set of modules. None of them may transitively require sagemaker /
# aiobotocore / dash / cleanlab / umap-learn / ipython / matplotlib — those
# only land via [aws] / [modeling] / [ui] extras and must NOT be installed
# here. If a refactor moves a heavy import to module-top in one of these
# files, this job fails and tells us before an endpoint deploy does.
basepython = python3.12
skip_install = false
deps =
    # Intentionally no extras — base install only.
commands =
    python -c "from workbench.endpoints.fast_inference import fast_inference; \
               from workbench.endpoints.async_inference import async_inference; \
               from workbench.endpoints.inference import check_dataframe; \
               from workbench.endpoints.uq_harness import compute_vgmu_confidence; \
               from workbench.algorithms.dataframe.uq_model import UQModel; \
               from workbench.algorithms.dataframe.fingerprint_proximity import FingerprintProximity; \
               from workbench.algorithms.dataframe.proximity import Proximity; \
               from workbench.algorithms.dataframe.residual_features import ResidualFeatures; \
               from workbench.utils.chem_utils.fingerprints import compute_morgan_fingerprints; \
               from workbench.core.parameter_store_core import ParameterStoreCore; \
               from workbench.core.df_store_core import DFStoreCore; \
               from workbench.utils.execution_environment import running_as_service; \
               from workbench.core.cloud_platform.aws.boto_session import get_boto3_session; \
               print('endpoint import surface OK')"
    # Sanity-check that heavy deps did NOT slip in (any of these means a transitive import leaked)
    python -c "import importlib.util; \
               heavy = ['sagemaker', 'aiobotocore', 'cleanlab', 'umap', 'dash', 'matplotlib', 'mordred']; \
               leaked = [m for m in heavy if importlib.util.find_spec(m) is not None]; \
               assert not leaked, f'Heavy deps installed in endpoint-safe env: {leaked}'; \
               print('endpoint extras are correctly excluded')"
